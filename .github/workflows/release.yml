name: Release

# This workflow mirrors the release shape used by ../ought, but only ships
# Margin's macOS DMG for now. Until we have a Developer ID Application
# certificate, the release DMG is ad-hoc signed and not notarized.
#
# 1. workflow_dispatch bumps version files, commits to main, and pushes vX.Y.Z.
# 2. push tags ["v*"] builds the DMG, updater archive, and latest.json,
#    then attaches them to a GitHub release.

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Release v{0} · 1/2 (bump + tag)', inputs.version) || format('Release {0} · 2/2 (build DMG)', github.ref_name) }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New semver (e.g. 0.2.0 or 0.2.0-rc1)'
        required: true
        type: string

  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  bump-and-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.-]+)?$'; then
            echo "Error: version must be semver format (e.g. 0.2.0 or 0.2.0-rc1)"
            echo "Got: ${{ inputs.version }}"
            exit 1
          fi

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: soseinai
          repositories: margin

      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify tag does not already exist
        run: |
          if git ls-remote --tags origin "v${{ inputs.version }}" | grep -q .; then
            echo "Error: tag v${{ inputs.version }} already exists on origin"
            exit 1
          fi

      - name: Bump app versions
        env:
          VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const version = process.env.VERSION;

          function writeJson(path, value) {
            fs.writeFileSync(path, `${JSON.stringify(value, null, 2)}\n`);
          }

          for (const path of ['apps/desktop/package.json', 'apps/web/package.json']) {
            const json = JSON.parse(fs.readFileSync(path, 'utf8'));
            json.version = version;
            writeJson(path, json);
          }

          const tauriConfigPath = 'apps/desktop/src-tauri/tauri.conf.json';
          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
          tauriConfig.version = version;
          tauriConfig.bundle ??= {};
          tauriConfig.bundle.macOS ??= {};
          tauriConfig.bundle.macOS.bundleVersion = version;
          writeJson(tauriConfigPath, tauriConfig);

          const cargoTomlPath = 'apps/desktop/src-tauri/Cargo.toml';
          const cargoToml = fs.readFileSync(cargoTomlPath, 'utf8');
          fs.writeFileSync(
            cargoTomlPath,
            cargoToml.replace(/^version = ".*"$/m, `version = "${version}"`)
          );
          NODE

          npm install --package-lock-only --ignore-scripts
          cargo metadata --format-version 1 >/dev/null

      - name: Show diff
        run: git diff --stat && git diff

      - name: Commit, tag, and push
        run: |
          if git diff --quiet; then
            echo "Error: no version files changed"
            exit 1
          fi

          git config user.name "sosein-release-bot[bot]"
          git config user.email "3199403+sosein-release-bot[bot]@users.noreply.github.com"
          git add \
            apps/desktop/package.json \
            apps/web/package.json \
            apps/desktop/src-tauri/tauri.conf.json \
            apps/desktop/src-tauri/Cargo.toml \
            package-lock.json \
            Cargo.lock
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Summary
        run: |
          echo "## Release v${{ inputs.version }} prepared" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version files bumped to \`${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag \`v${{ inputs.version }}\` pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- The tag push has triggered the DMG build/release run." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Watch the next run: https://github.com/${{ github.repository }}/actions/workflows/release.yml" >> "$GITHUB_STEP_SUMMARY"

  build-dmg:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: extractions/setup-just@v4

      - name: Install dependencies
        run: npm ci

      - name: Build DMG
        env:
          MARGIN_MACOS_SIGNING: adhoc
          MARGIN_CREATE_UPDATER_ARTIFACTS: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY. Generate a Tauri updater key and add the private key as a repository secret."
            exit 1
          fi

          just package-mac-dmg

      - name: Create updater manifest
        run: node scripts/write-tauri-updater-manifest.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: margin-release-assets
          path: |
            target/release/bundle/dmg/Margin_*.dmg
            target/release/bundle/updater/Margin_*.app.tar.gz
            target/release/bundle/updater/Margin_*.app.tar.gz.sig
            target/release/bundle/updater/latest.json
          if-no-files-found: error

  release:
    needs: build-dmg
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: true
          body: |
            This release contains a macOS DMG and Tauri updater metadata for Margin.

            The DMG is currently ad-hoc signed and is not notarized because the project does not yet have a Developer ID Application certificate. macOS may require manual approval in Privacy & Security, or quarantine removal, before opening the app.
          files: |
            Margin_*.dmg
            Margin_*.app.tar.gz
            Margin_*.app.tar.gz.sig
            latest.json
